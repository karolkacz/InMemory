<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InMemory — Błąd 404</title>
    <link rel="stylesheet" href="/styles.css?v=12">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
            text-align: center;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
        }
        .error-code {
            font-size: clamp(4rem, 15vw, 8rem);
            font-family: var(--font-serif);
            color: var(--accent);
            line-height: 1;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .error-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-family: var(--font-serif);
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .error-description {
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            color: var(--text-secondary);
            max-width: 500px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 30px;
            background-color: var(--accent);
            color: #ffffff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            border: 1px solid transparent;
        }
        .error-btn:hover {
            background-color: var(--text-primary);
            transform: translateY(-2px);
        }
        
        /* Dark Theme adjustments */
        [data-theme="dark"] .error-btn {
            background-color: var(--accent);
            color: #121110;
            font-weight: 600;
        }
        [data-theme="dark"] .error-btn:hover {
            background-color: #ffffff;
            color: #121110;
        }
    </style>
</head>
<body>

    <!-- Навигационная панель (Header) -->
    <header class="site-header">
        <div class="nav-container">
            <a href="/example" class="nav-logo-link" aria-label="In Memory">
                <span class="nav-logo-text">In Memory</span>
            </a>
            <button id="theme-toggle-btn" class="theme-toggle" aria-label="Przełącz motyw graficzny">
                Tryb ciemny
            </button>
        </div>
    </header>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Strona nie została odnaleziona</h1>
        <p class="error-description">Przepraszamy, ale strona, której szukasz, nie istnieje lub została przeniesiona pod inny adres.</p>
        <a href="/example" class="error-btn">Wróć do strony głównej</a>
    </div>

    <script src="/app.js"></script>
</body>
</html>
